<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码保险箱</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .vault-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px;
    }
    .vault-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .vault-header h2 {
      font-size: 20px;
      font-weight: 600;
    }
    .master-password-section {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }
    .master-password-section h3 {
      font-size: 16px;
      margin-bottom: 16px;
    }
    .master-password-form {
      display: flex;
      gap: 12px;
    }
    .master-password-form input {
      flex: 1;
    }
    .lock-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 40px;
    }
    .lock-icon {
      font-size: 64px;
      margin-bottom: 24px;
    }
    .lock-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .lock-subtitle {
      color: var(--text-secondary);
      margin-bottom: 24px;
    }
    .unlock-form {
      width: 100%;
      max-width: 300px;
    }
    .unlock-form input {
      width: 100%;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <header class="title-bar" id="titleBar">
    <div class="title-bar-drag">
      <span class="app-icon">🔑</span>
      <span class="app-title">密码保险箱</span>
    </div>
    <div class="title-bar-controls">
      <button class="title-btn title-btn-close" id="btnClose" title="关闭">✕</button>
    </div>
  </header>

  <div class="vault-container" id="vaultContainer">
    <div class="master-password-section" id="masterPasswordSection" style="display: none;">
      <h3>设置主密码</h3>
      <div class="master-password-form">
        <input type="password" id="newMasterPassword" class="input" placeholder="设置主密码">
        <input type="password" id="confirmMasterPassword" class="input" placeholder="确认主密码">
        <button class="btn btn-primary" id="btnSetMaster">设置</button>
      </div>
    </div>

    <div class="lock-screen" id="lockScreen">
      <div class="lock-icon">🔒</div>
      <div class="lock-title" id="lockTitle">密码保险箱已锁定</div>
      <div class="lock-subtitle" id="lockSubtitle">请输入主密码解锁</div>
      <div class="unlock-form">
        <input type="password" id="unlockPassword" class="input" placeholder="输入主密码">
        <button class="btn btn-primary" id="btnUnlock" style="width: 100%;">解锁</button>
      </div>
    </div>

    <div class="vault-content" id="vaultContent" style="display: none;">
      <div class="vault-header">
        <h2>密码列表</h2>
        <div class="page-actions">
          <button class="btn btn-primary" id="btnAdd">添加密码</button>
        </div>
      </div>

      <div class="passwords-list" id="passwordsList">
        <div class="empty-state">
          <p>暂无保存的密码</p>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="modalPassword">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="passwordModalTitle">添加密码</h3>
        <button class="modal-close" id="btnClosePassword">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>名称:</label>
          <input type="text" id="passwordName" class="input" placeholder="输入名称">
        </div>
        <div class="form-group">
          <label>密码:</label>
          <input type="password" id="passwordValue" class="input" placeholder="输入密码">
        </div>
        <div class="form-group">
          <label>备注:</label>
          <textarea id="passwordNotes" class="textarea" rows="3" placeholder="输入备注"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btnCancelPassword">取消</button>
        <button class="btn btn-primary" id="btnSavePassword">保存</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    class PasswordVaultApp {
      private passwords = [];
      private editingPassword = null;
      private isUnlocked = false;

      constructor() {
        this.init();
      }

      private async init() {
        const isSet = await window.electronAPI.passwords.isSet();

        if (!isSet) {
          document.getElementById('masterPasswordSection').style.display = 'block';
          document.getElementById('lockScreen').style.display = 'none';
        } else {
          document.getElementById('lockScreen').style.display = 'flex';
          document.getElementById('vaultContent').style.display = 'none';
        }

        this.setupEventListeners();
      }

      private setupEventListeners() {
        document.getElementById('btnClose').addEventListener('click', () => {
          window.electronAPI.window.closePasswordVault();
        });

        document.getElementById('btnSetMaster').addEventListener('click', () => {
          this.setMasterPassword();
        });

        document.getElementById('btnUnlock').addEventListener('click', () => {
          this.unlock();
        });

        document.getElementById('unlockPassword').addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            this.unlock();
          }
        });

        document.getElementById('btnAdd').addEventListener('click', () => {
          this.showPasswordModal();
        });

        document.getElementById('btnClosePassword').addEventListener('click', () => {
          this.hideModal('modalPassword');
        });

        document.getElementById('btnCancelPassword').addEventListener('click', () => {
          this.hideModal('modalPassword');
        });

        document.getElementById('btnSavePassword').addEventListener('click', () => {
          this.savePassword();
        });

        document.querySelectorAll('.modal-backdrop').forEach(backdrop => {
          backdrop.addEventListener('click', () => {
            const modal = backdrop.closest('.modal');
            if (modal) {
              modal.classList.remove('active');
            }
          });
        });
      }

      private async setMasterPassword() {
        const newPass = document.getElementById('newMasterPassword').value;
        const confirmPass = document.getElementById('confirmMasterPassword').value;

        if (!newPass) {
          this.showToast('请输入主密码', 'warning');
          return;
        }

        if (newPass.length < 6) {
          this.showToast('主密码至少需要6个字符', 'warning');
          return;
        }

        if (newPass !== confirmPass) {
          this.showToast('两次输入的密码不一致', 'warning');
          return;
        }

        try {
          await window.electronAPI.passwords.setMaster(newPass);
          this.showToast('主密码设置成功', 'success');
          document.getElementById('masterPasswordSection').style.display = 'none';
          this.isUnlocked = true;
          document.getElementById('vaultContent').style.display = 'block';
          await this.loadPasswords();
        } catch (error) {
          console.error('Failed to set master password:', error);
          this.showToast('设置失败', 'error');
        }
      }

      private async unlock() {
        const password = document.getElementById('unlockPassword').value;

        if (!password) {
          this.showToast('请输入主密码', 'warning');
          return;
        }

        try {
          const isValid = await window.electronAPI.passwords.verifyMaster(password);

          if (isValid) {
            this.isUnlocked = true;
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('vaultContent').style.display = 'block';
            await this.loadPasswords();
          } else {
            this.showToast('主密码错误', 'error');
          }
        } catch (error) {
          console.error('Failed to verify master password:', error);
          this.showToast('验证失败', 'error');
        }
      }

      private async loadPasswords() {
        try {
          this.passwords = await window.electronAPI.passwords.getAll();
          this.renderPasswords();
        } catch (error) {
          console.error('Failed to load passwords:', error);
        }
      }

      private renderPasswords() {
        const list = document.getElementById('passwordsList');

        if (this.passwords.length === 0) {
          list.innerHTML = '<div class="empty-state"><p>暂无保存的密码</p></div>';
          return;
        }

        list.innerHTML = this.passwords.map(entry => `
          <div class="password-item">
            <div class="password-icon">🔑</div>
            <div class="password-info">
              <div class="password-name">${this.escapeHtml(entry.name)}</div>
              <div class="password-meta">
                <span>创建: ${new Date(entry.createdDate).toLocaleDateString()}</span>
              </div>
            </div>
            <div class="password-value">
              <span class="password-dots">••••••••</span>
              <button class="btn btn-sm btn-secondary" onclick="vaultApp.copyPassword('${entry.id}')">复制</button>
            </div>
            <div class="password-actions">
              <button class="btn btn-sm btn-secondary" onclick="vaultApp.editPassword('${entry.id}')">编辑</button>
              <button class="btn btn-sm btn-danger" onclick="vaultApp.deletePassword('${entry.id}')">删除</button>
            </div>
          </div>
        `).join('');
      }

      private showPasswordModal(entry) {
        this.editingPassword = entry || null;
        document.querySelector('#modalPassword h3').textContent = entry ? '编辑密码' : '添加密码';
        document.getElementById('passwordName').value = entry?.name || '';
        document.getElementById('passwordValue').value = entry?.password || '';
        document.getElementById('passwordNotes').value = entry?.notes || '';
        this.showModal('modalPassword');
      }

      private async savePassword() {
        const name = document.getElementById('passwordName').value;
        const password = document.getElementById('passwordValue').value;
        const notes = document.getElementById('passwordNotes').value;

        if (!name || !password) {
          this.showToast('请填写名称和密码', 'warning');
          return;
        }

        const entry = {
          id: this.editingPassword?.id || Math.random().toString(36).substr(2, 9),
          name,
          password,
          notes,
          createdDate: this.editingPassword?.createdDate || new Date(),
          modifiedDate: new Date()
        };

        try {
          await window.electronAPI.passwords.save(entry);
          const index = this.passwords.findIndex(p => p.id === entry.id);
          if (index >= 0) {
            this.passwords[index] = entry;
          } else {
            this.passwords.push(entry);
          }
          this.hideModal('modalPassword');
          this.renderPasswords();
          this.showToast('密码已保存', 'success');
        } catch (error) {
          console.error('Failed to save password:', error);
          this.showToast('保存失败', 'error');
        }
      }

      private async copyPassword(id) {
        const entry = this.passwords.find(p => p.id === id);
        if (entry) {
          await navigator.clipboard.writeText(entry.password);
          this.showToast('密码已复制到剪贴板', 'success');
          setTimeout(() => {
            navigator.clipboard.writeText('');
          }, 30000);
        }
      }

      private editPassword(id) {
        const entry = this.passwords.find(p => p.id === id);
        if (entry) {
          this.showPasswordModal(entry);
        }
      }

      private async deletePassword(id) {
        if (!confirm('确定要删除此密码吗？')) return;

        try {
          await window.electronAPI.passwords.delete(id);
          this.passwords = this.passwords.filter(p => p.id !== id);
          this.renderPasswords();
          this.showToast('密码已删除', 'success');
        } catch (error) {
          console.error('Failed to delete password:', error);
          this.showToast('删除失败', 'error');
        }
      }

      private showModal(id) {
        document.getElementById(id).classList.add('active');
      }

      private hideModal(id) {
        document.getElementById(id).classList.remove('active');
      }

      private showToast(message, type) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => {
          toast.remove();
        }, 3000);
      }

      private escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    }

    window.vaultApp = new PasswordVaultApp();
  </script>
</body>
</html>
